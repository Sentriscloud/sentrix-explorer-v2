name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      # Lint both targets — the WASM lib has different cfg-gates than
      # the SSR bin, so a single pass would skip half the code.
      - name: clippy (wasm/hydrate)
        run: cargo clippy --target wasm32-unknown-unknown --no-default-features --features hydrate --lib -- -D warnings
      - name: clippy (ssr)
        run: cargo clippy --no-default-features --features ssr --bin sentrix-explorer-v2 -- -D warnings

  build:
    name: leptos build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-leptos
        # No version pin — leaves us tracking latest, which matters
        # because cargo-leptos bundles a wasm-bindgen-cli; if the
        # bundled version trails our Cargo's transitive `wasm-bindgen`,
        # the build fails with a schema-version mismatch (#1).
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos
      - name: install tailwindcss
        run: |
          curl -fsSL -o /usr/local/bin/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x /usr/local/bin/tailwindcss
      - name: build mainnet bundle
        env:
          SENTRIX_NETWORK: mainnet
        run: cargo leptos build --release
      - name: build testnet bundle
        env:
          SENTRIX_NETWORK: testnet
        run: cargo leptos build --release
